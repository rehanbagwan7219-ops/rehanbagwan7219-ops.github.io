<!DOCTYPE html>
<html>
<head>
<title>Tourist Maps</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
margin:0;
}

header{
background:#333;
color:white;
padding:20px;
}

.container{
width:90%;
margin:auto;
padding:20px;
}

.place{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

iframe{
width:100%;
height:300px;
border:0;
border-radius:10px;
}

.btn{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:#007BFF;
color:white;
text-decoration:none;
border-radius:5px;
}

.btn:hover{
background:#0056b3;
}

</style>

</head>

<body>

<header>
<h1>Tourist Location Maps</h1>
<p>Click below to get directions</p>
</header>

<div class="container">

<!-- Pandharpur -->

<div class="place">
<h2>Pandharpur Temple</h2>

<iframe src="https://www.google.com/maps?q=17.6775,75.3352&z=15&output=embed"></iframe>

<br>

<a class="btn" href="https://www.google.com/maps/dir/?api=1&destination=17.6775,75.3352" target="_blank">
Get Directions
</a>

</div>


<!-- Tuljapur -->

<div class="place">
<h2>Tuljapur Temple</h2>

<iframe src="https://www.google.com/maps?q=18.011386,76.125641&z=15&output=embed"></iframe>

<br>

<a class="btn" href="https://www.google.com/maps/dir/?api=1&destination=18.011386,76.125641" target="_blank">
Get Directions
</a>

</div>


<!-- Akkalkot -->

<div class="place">
<h2>Akkalkot Swami Samarth</h2>

<iframe src="https://www.google.com/maps?q=17.5270448,76.2026183&z=15&output=embed"></iframe>

<br>

<a class="btn" href="https://www.google.com/maps/dir/?api=1&destination=17.5270448,76.2026183" target="_blank">
Get Directions
</a>

</div>


<!-- Solapur Fort -->

<div class="place">
<h2>Solapur Fort</h2>

<iframe src="https://www.google.com/maps?q=17.67447,75.90213&z=15&output=embed"></iframe>

<br>

<a class="btn" href="https://www.google.com/maps/dir/?api=1&destination=17.67447,75.90213" target="_blank">
Get Directions
</a>

</div>

</div>

</body>
</html>
